<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ari@bjorn ~ cv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="terminal">

  <div id="titlebar">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <span id="titlebar-title">ari@bjorn — ~</span>
  </div>

  <div id="breadcrumb">
    <span class="bc-item" onclick="runCmd('ls')">~</span>
  </div>

  <div id="output"></div>

  <div id="input-row">
    <span class="input-ps1">
      <span class="ps1-user">ari</span><span class="ps1-at">@</span><span class="ps1-host">bjorn</span><span class="ps1-sep">:</span><span class="ps1-path">~</span><span class="ps1-dollar"> $</span>
    </span>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
  </div>

  <div id="bottom-nav">
    <button class="nav-btn" onclick="runCmd('whoami')">whoami</button>
    <button class="nav-btn" onclick="runCmd('experience')">experience</button>
    <button class="nav-btn" onclick="runCmd('skills')">skills</button>
    <button class="nav-btn" onclick="runCmd('projects')">projects</button>
    <button class="nav-btn" onclick="runCmd('hackathons')">hackathons</button>
    <button class="nav-btn" onclick="runCmd('contact')">contact</button>
    <button class="nav-btn" onclick="runCmd('interests')">interests</button>
    <button class="nav-btn" onclick="runCmd('neofetch')">neofetch</button>
    <button class="nav-btn" onclick="runCmd('clear')">clear</button>
  </div>

</div>

<script src="js/data.js"></script>
<script src="js/render.js"></script>
<script src="js/commands.js"></script>
<script src="js/terminal.js"></script>
</body>
</html>
