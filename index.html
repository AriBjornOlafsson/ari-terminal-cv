<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ari@bjorn ~ cv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0d;
      --bg2:      #141414;
      --green:    #00ff99;
      --green2:   #00cc77;
      --blue:     #5ea3f0;
      --yellow:   #ffcc00;
      --red:      #ff5555;
      --gray:     #666;
      --dim:      #444;
      --white:    #e8e8e8;
      --prompt:   #00ff99;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    #terminal {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 8px;
    }

    /* Title bar */
    #titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #28c941; }
    #titlebar span {
      margin-left: auto;
      margin-right: auto;
      transform: translateX(-24px);
      color: var(--gray);
      font-size: 12px;
    }

    /* Output area */
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 16px 8px 8px;
      scroll-behavior: smooth;
    }
    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .line { white-space: pre-wrap; word-break: break-word; }
    .line + .line { margin-top: 0; }

    /* Prompt line */
    .prompt-line { display: flex; align-items: baseline; gap: 0; }
    .ps1 { color: var(--green); flex-shrink: 0; }
    .ps1-user  { color: var(--green); font-weight: 700; }
    .ps1-at    { color: var(--dim); }
    .ps1-host  { color: var(--blue); }
    .ps1-sep   { color: var(--dim); }
    .ps1-path  { color: var(--yellow); }
    .ps1-dollar { color: var(--white); margin-right: 8px; }
    .cmd-echo  { color: var(--white); }

    /* Colors */
    .c-green  { color: var(--green); }
    .c-blue   { color: var(--blue); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }
    .c-gray   { color: var(--gray); }
    .c-dim    { color: var(--dim); }
    .c-white  { color: var(--white); }
    .bold     { font-weight: 700; }

    /* Input row */
    #input-row {
      display: flex;
      align-items: baseline;
      padding: 8px 8px 16px;
      flex-shrink: 0;
      border-top: 1px solid #1a1a1a;
    }
    #input-row .ps1-label {
      flex-shrink: 0;
      margin-right: 8px;
    }
    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: inherit;
      font-size: inherit;
      caret-color: var(--green);
    }

    /* ASCII art */
    .ascii { color: var(--green); line-height: 1.2; }

    /* Section headers */
    .sec-header {
      color: var(--green);
      font-weight: 700;
      border-bottom: 1px solid var(--dim);
      padding-bottom: 2px;
      margin-bottom: 4px;
    }

    /* Job entry */
    .job-title   { color: var(--yellow); font-weight: 700; }
    .job-company { color: var(--blue); }
    .job-date    { color: var(--gray); }
    .job-tech    { color: var(--green2); font-size: 12px; }

    /* Skill tags */
    .tag {
      display: inline-block;
      background: #1a2a1a;
      color: var(--green2);
      border: 1px solid #2a3a2a;
      padding: 1px 6px;
      border-radius: 3px;
      margin: 2px;
      font-size: 12px;
    }

    /* Hack animation */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .hack { animation: flicker 0.1s infinite; color: var(--red); }

    /* Boot */
    .boot { color: var(--dim); font-size: 12px; }
    .boot-ok { color: var(--green); }
  </style>
</head>

<script>

██╔══██╗██╔══██╗██║    ██╔══██╗     ██║██╔═══██╗██╔══██╗████╗  ██║
███████║██████╔╝██║    ██████╔╝     ██║██║   ██║██████╔╝██╔██╗ ██║
██╔══██║██╔══██╗██║    ██╔══██╗██   ██║██║   ██║██╔══██╗██║╚██╗██║
██║  ██║██║  ██║██║    ██████╔╝╚█████╔╝╚██████╔╝██║  ██║██║ ╚████║
╚═╝  ╚═╝╚═╝  ╚═╝╚═╝    ╚═════╝  ╚════╝  ╚═════╝ ╚═╝  ╚═╝╚═╝  ╚═══╝

const COMMANDS = {

let history = [];
let histIdx  = -1;

// ─── Output helpers ──────────────────────────────────────────────────────────

function nl(n=1) { for (let i=0;i<n;i++) append(''); }

function append(html, cls='line') {
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function g(s)  { return `<span class="c-green">${s}</span>`; }
function b(s)  { return `<span class="c-blue">${s}</span>`; }
function y(s)  { return `<span class="c-yellow">${s}</span>`; }
function r(s)  { return `<span class="c-red">${s}</span>`; }
function gr(s) { return `<span class="c-gray">${s}</span>`; }
function w(s)  { return `<span class="c-white bold">${s}</span>`; }
function dim(s){ return `<span class="c-dim">${s}</span>`; }

function tag(s){ return `<span class="tag">${s}</span>`; }

function sec(title) {
  nl();
  append(`<span class="sec-header">── ${title} ${'─'.repeat(Math.max(0, 52 - title.length))}</span>`);

}

function job(title, company, dates, desc, tech) {

// ─── Input handling ──────────────────────────────────────────────────────────

const COMPLETIONS = Object.keys(COMMANDS);

function echoPrompt(cmd) {
  append(
    `<span class="ps1-user">ari</span><span class="ps1-at">@</span><span class="ps1-host">bjorn</span><span class="ps1-sep">:</span><span class="ps1-path">~</span><span class="ps1-dollar"> $</span> <span class="cmd-echo">${cmd}</span>`,
    'line prompt-line'
  );
}

function run(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  history.unshift(trimmed);
  histIdx = -1;

  echoPrompt(trimmed);
  nl();

  const [cmd, ...rest] = trimmed.split(/\s+/);
  const args = rest.join(' ');
  const fn = COMMANDS[cmd.toLowerCase()];

  if (fn) {
    fn(args);
  } else {
    append(`${r('command not found:')} ${cmd}  ${gr(`— try ${g('help')}`)}`);
    nl();
  }
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    run(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      input.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      input.value = history[histIdx];
    } else {
      histIdx = -1;
      input.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const partial = input.value.trim();
    const matches = COMPLETIONS.filter(c => c.startsWith(partial));
    if (matches.length === 1) {
      input.value = matches[0];
    } else if (matches.length > 1) {
      echoPrompt(partial);
      append(matches.map(g).join('  '));
      nl();
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clear();
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    echoPrompt(input.value + '^C');
    input.value = '';
    nl();
  }
});

// Keep focus on input
document.addEventListener('click', () => input.focus());
